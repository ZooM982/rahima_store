<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta (overridden per-page by react-helmet-async) ── -->
    <title>Rahima Store — Beauté & Cosmétiques au Sénégal</title>
    <meta name="description" content="L'excellence de la beauté africaine et internationale. Cosmétiques premium, soins naturels, livraison à Dakar et partout au Sénégal." />
    <meta name="theme-color" content="#FF4D8D" />
    <meta name="author" content="Rahima Store" />

    <!-- ── Open Graph fallback ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rahima Store" />
    <meta property="og:title" content="Rahima Store — Beauté & Cosmétiques au Sénégal" />
    <meta property="og:description" content="L'excellence de la beauté africaine et internationale. Cosmétiques premium, soins naturels, livraison à Dakar." />
    <meta property="og:image" content="https://rahima-store.com/og-image.jpg" />
    <meta property="og:url" content="https://rahima-store.com" />
    <meta property="og:locale" content="fr_SN" />

    <!-- ── Twitter Card fallback ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rahima Store — Beauté & Cosmétiques au Sénégal" />
    <meta name="twitter:description" content="L'excellence de la beauté africaine. Cosmétiques premium, livraison à Dakar." />
    <meta name="twitter:image" content="https://rahima-store.com/og-image.jpg" />

    <!-- ── Icons ── -->
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo.jpeg" />

    <!-- ── PWA ── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rahima Store" />
    <meta name="msapplication-TileColor" content="#FF4D8D" />

    <!-- ── Geo ── -->
    <meta name="geo.region" content="SN-DK" />
    <meta name="geo.placename" content="Dakar, Sénégal" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Canonical (fallback, overridden per-page) ── -->
    <link rel="canonical" href="https://rahima-store.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
