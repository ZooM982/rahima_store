<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />

		<!-- ── Viewport ── -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- ── Primary Meta (overridden per-page by react-helmet-async) ── -->
		<title>Rahima Store — Beauté et Cosmétiques au Sénégal</title>
		<meta
			name="description"
			content="L'excellence de la beauté africaine et internationale. Cosmétiques premium, soins naturels, livraison à Dakar et partout au Sénégal."
		/>
		<meta name="theme-color" content="#000000" />
		<meta name="author" content="Rahima Store" />

		<!-- ── Open Graph fallback ── -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Rahima Store" />
		<meta
			property="og:title"
			content="Rahima Store — Beauté et Cosmétiques au Sénégal"
		/>
		<meta
			property="og:description"
			content="L'excellence de la beauté africaine et internationale. Cosmétiques premium, soins naturels, livraison à Dakar."
		/>
		<meta property="og:image" content="https://rahima.store/logo.png" />
		<meta property="og:url" content="https://rahima.store" />
		<meta property="og:locale" content="fr_SN" />

		<!-- ── Twitter Card fallback ── -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta
			name="twitter:title"
			content="Rahima Store — Beauté et Cosmétiques au Sénégal"
		/>
		<meta
			name="twitter:description"
			content="L'excellence de la beauté africaine. Cosmétiques premium, livraison à Dakar."
		/>
		<meta
			name="twitter:image"
			content="https://rahima.store/logo.png"
		/>

		<!-- ── Icons ── -->
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png"/>
		<link rel="icon" type="image/png" href="/logo.png" />

		<!-- ── PWA ── -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black" />
		<meta name="apple-mobile-web-app-title" content="Rahima Store" />
		<meta name="msapplication-TileColor" content="#000000" />

		<!-- ── Geo ── -->
		<meta name="geo.region" content="SN-DK" />
		<meta name="geo.placename" content="Dakar, Sénégal" />

		<!-- ── Fonts ── -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- ── Canonical (fallback, overridden per-page) ── -->
		<link rel="canonical" href="https://rahima.store" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
